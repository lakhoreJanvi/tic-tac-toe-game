services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: nakama
      POSTGRES_PASSWORD: nakama_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nakama -d nakama"]
      interval: 5s
      timeout: 3s
      retries: 30

  nakama:
    image: heroiclabs/nakama:3.38.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nakama-migrate:
        condition: service_completed_successfully
    command:
      - "--name"
      - "nakama1"
      - "--database.address"
      - "nakama:nakama_password@postgres:5432/nakama"
      - "--logger.level"
      - "DEBUG"
      - "--session.token_expiry_sec"
      - "7200"
      - "--runtime.js_entrypoint"
      - "index.js"
      - "--runtime.path"
      - "/nakama/data/modules"
      - "--config"
      - "/nakama/data/config.yml"
    volumes:
      - ./nakama/config.yml:/nakama/data/config.yml:ro
      - ./backend/nakama:/nakama/data/modules:ro
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
      - "7352:7352/udp"

  nakama-migrate:
    image: heroiclabs/nakama:3.38.0
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - "migrate"
      - "up"
      - "--database.address"
      - "nakama:nakama_password@postgres:5432/nakama"

volumes:
  postgres_data:
